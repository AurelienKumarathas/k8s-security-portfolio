name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: kubectl dry-run validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'
      - name: Validate manifests
        run: |
          find policies/ manifests-insecure/ -name '*.yaml' -o -name '*.yml' 2>/dev/null | while read f; do
            kubectl apply --dry-run=client -f "$f" 2>/dev/null || echo "::warning::Skipped $f (requires cluster context)"
          done
          echo "Validation complete."
