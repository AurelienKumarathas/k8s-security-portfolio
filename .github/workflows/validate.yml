name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: kubectl dry-run validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2
        with:
          version: 'v1.29.0'

      - name: Validate manifests
        run: |
          find policies/ manifests-insecure/ -name '*.yaml' -o -name '*.yml' 2>/dev/null | while read f; do
            kubectl apply --dry-run=client -f "$f" 2>/dev/null || echo "::warning::Skipped $f (requires cluster context)"
          done
          echo "Validation complete."
