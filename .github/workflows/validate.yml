name: Validate Kubernetes Manifests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: kubectl dry-run validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2
        with:
          version: 'v1.29.0'

      - name: Validate manifests
        run: |
          # Note: kubectl apply --dry-run=client validates syntax and native K8s schema only.
          # Gatekeeper CRDs (ConstraintTemplate, K8sDenyPrivileged, K8sRequireLimits) require
          # --dry-run=server against a cluster with Gatekeeper installed for full validation.
          # Client-side dry-run for CRD manifests confirms YAML is parseable but not schema-valid.
          # For full shift-left security scanning (Checkov, kubesec), see the companion repo:
          # https://github.com/AurelienKumarathas/terraform-devsecops-pipeline
          find policies/ manifests-insecure/ -name '*.yaml' -o -name '*.yml' | while read f; do
            kubectl apply --dry-run=client -f "$f" 2>&1 | grep -v '^Warning' || echo "::warning::Skipped $f (requires cluster context or Gatekeeper CRD)"
          done
          echo "Validation complete."
